name: CI

# Fail-fast test pyramid (hosted CI):
#   unit (fast, blocks everything)
#     -> api  (REST + DB, against restful-booker + SQLite)
#   -> pages (publish Living Documentation + coverage to GitHub Pages)
#
# The Playwright UI E2E suite is NOT run here: the public demo shop is
# Cloudflare-protected and the self-hostable Toolshop images are arm64-only
# ("exec format error" on the amd64 hosted runners). It is gated locally instead,
# via the .githooks/pre-push hook against a self-hosted Toolshop (see README).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  HEADLESS: "true"

jobs:
  # Fast feedback: unit tests + coverage. If this is red, nothing else runs.
  unit:
    name: Unit & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet build ShopGuard -c Release
      - name: Unit tests + coverage
        run: |
          dotnet test ShopGuard/ShopGuard.UnitTests -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --logger "junit;LogFilePath=$GITHUB_WORKSPACE/TestResults/unit.junit.xml" \
            --results-directory TestResults
      - name: Coverage summary
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:coverage -reporttypes:"TextSummary;MarkdownSummaryGithub" \
            -assemblyfilters:"+ShopGuard.Core"
          cat coverage/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          grep -E "Line coverage|Branch coverage" coverage/Summary.txt

  # REST API + SQL database scenarios (no browser needed).
  api:
    name: API & DB (@api, @db)
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: API + DB tests
        run: |
          # restful-booker can be slow; retry the suite up to 3 times.
          for attempt in 1 2 3; do
            dotnet test ShopGuard/ShopGuard.E2ETests -c Release \
              --filter "TestCategory=api|TestCategory=db" \
              --logger "junit;LogFilePath=$GITHUB_WORKSPACE/TestResults/api.junit.xml" && exit 0
            echo "attempt $attempt failed"
          done
          exit 1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-results
          path: TestResults/

  # Publish Living Documentation (BDD scenarios) + coverage report to GitHub Pages.
  pages:
    name: Publish report (Pages)
    needs: [unit, api]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Build site (Living Doc + coverage)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          mkdir -p site
          # Coverage HTML
          dotnet test ShopGuard/ShopGuard.UnitTests -c Release \
            --collect:"XPlat Code Coverage" --results-directory cov
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:"cov/**/coverage.cobertura.xml" \
            -targetdir:site/coverage -reporttypes:Html -assemblyfilters:"+ShopGuard.Core"
          # Living Documentation from the Gherkin feature folder
          dotnet tool install --global SpecFlow.Plus.LivingDoc.CLI
          livingdoc feature-folder ShopGuard/ShopGuard.E2ETests/Features -o site/living-doc.html
          # Landing page
          cat > site/index.html <<'HTML'
          <!doctype html><html lang="en"><meta charset="utf-8">
          <title>ShopGuard — Reports</title>
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <style>
            body{font-family:system-ui,Segoe UI,Arial,sans-serif;max-width:780px;margin:3rem auto;padding:0 1rem;background:#0f172a;color:#e2e8f0}
            h1{font-size:1.8rem} a{color:#38bdf8}
            .card{display:block;padding:1.2rem 1.4rem;margin:1rem 0;border:1px solid #1e3a5f;border-radius:12px;background:#13203b;text-decoration:none;color:inherit}
            .card:hover{border-color:#38bdf8} .card h2{margin:0 0 .3rem;font-size:1.15rem;color:#38bdf8}
            .muted{color:#94a3b8;font-size:.92rem}
          </style>
          <h1>🛡️ ShopGuard — Live Reports</h1>
          <p class="muted">BDD test-automation framework · .NET 10 · Reqnroll · Playwright</p>
          <a class="card" href="living-doc.html"><h2>📋 Living Documentation</h2>
            <span class="muted">All Gherkin features &amp; scenarios (UI / API / DB), rendered from the feature folder.</span></a>
          <a class="card" href="coverage/index.html"><h2>📊 Code Coverage</h2>
            <span class="muted">ShopGuard.Core line/branch coverage (ReportGenerator).</span></a>
          <p class="muted">Generated by GitHub Actions · <a href="https://github.com/AdrianDeutsch/ShopGuard">source on GitHub</a></p>
          </html>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
