# Self-hosted "Toolshop" (practicesoftwaretesting.com) for running the UI E2E
# tests against a local instance — avoids the Cloudflare bot challenge that the
# public site serves to data-center IPs (GitHub-hosted runners).
#
# Uses the project's prebuilt sprint5 images (no source build).
#   UI  -> http://localhost:4200   (Angular, ng serve)
#   API -> http://localhost:8091   (Laravel via nginx/php-fpm)
name: toolshop

services:
  mariadb:
    image: yobasystems/alpine-mariadb:10.6.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: toolshop
    ports:
      - "3306:3306"

  laravel-api:
    image: testsmith/practice-software-testing-sprint5-api
    environment:
      - "PHP_OPCACHE_VALIDATE_TIMESTAMPS=1"
      - "DB_PORT=3306"
      - "DB_HOST=mariadb"
      - "host=localhost"
      - "DISABLE_LOGGING=true"
    volumes:
      - laravel-app-code:/var/www
    depends_on:
      - mariadb

  web:
    image: testsmith/practice-software-testing-web
    ports:
      - "8091:80"
      - "8000:81"
    volumes:
      - laravel-app-code:/var/www
    depends_on:
      - laravel-api

  angular-ui:
    image: testsmith/practice-software-testing-sprint5-ui
    command: bash -c "ng serve --host 0.0.0.0 --port 4200"
    ports:
      - "4200:4200"
    depends_on:
      - web

volumes:
  laravel-app-code:
